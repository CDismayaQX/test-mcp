[project]
name = "prolook-mcp-brand"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
  "fastmcp>=2.0",
  "uvicorn[standard]>=0.30",
  "redis>=5.0",
  "prolook-mcp-core",
]

[tool.uv.sources]
prolook-mcp-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/brand_server"]
