[project]
name = "prolook-mcp-core"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
  "pydantic>=2.0",
  "pydantic-settings>=2.0",
  "structlog>=24.0",
  "sqlalchemy[asyncio]>=2.0",
  "asyncpg>=0.29",
  "httpx>=0.27",
  "bcrypt>=4.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/prolook_mcp_core"]
