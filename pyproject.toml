[tool.uv.workspace]
members = ["packages/core", "packages/internal-server", "packages/brand-server"]

[tool.uv]
dev-dependencies = [
  "pytest>=8.0",
  "pytest-asyncio>=0.23",
  "ruff>=0.4",
  "mypy>=1.10",
]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.format]
quote-style = "double"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM", "S"]
ignore = ["B008"]

[tool.ruff.lint.per-file-ignores]
"packages/*/tests/*" = ["S101"]   # assert is idiomatic in pytest
"scripts/*" = ["S101", "SIM117"]  # scripts use nested async-with and assert freely

[tool.mypy]
python_version = "3.12"
strict = true
ignore_missing_imports = true
show_error_codes = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
addopts = "--import-mode=importlib"
filterwarnings = ["error", "ignore::DeprecationWarning:pytest_asyncio"]
testpaths = [
  "packages/core/tests",
  "packages/internal-server/tests",
  "packages/brand-server/tests"
]
